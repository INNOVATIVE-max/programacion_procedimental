<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contabilidad</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .contenedor{
            width: 850px;
            background: white;
            border: 3px solid #444;
            border-radius: 10px;
            padding: 20px;
        }

        .titulo{
            width: 100%;
            border: 2px solid #666;
            padding: 10px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
            border-radius: 5px;
            background: #e9ecef;
        }

        .contenido{
            display: flex;
            gap: 20px;
        }

        .perfil{
            width: 220px;
            border: 2px solid #666;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            background: #fafafa;
        }

        .foto{
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 3px solid #444;
            margin: auto;
            background: #d9d9d9;
            overflow: hidden;
        }

 .foto img{
           width: 100%;
height: 100%;
object-fit: contain;
        }

        .nombre{
            margin-top: 15px;
            border: 2px solid #666;
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
            background: white;
        }

        .datos{
            flex: 1;
            border: 2px solid #666;
            border-radius: 10px;
            padding: 20px;
            background: #fafafa;
        }

        .campo{
            margin-bottom: 15px;
        }

        .campo label{
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .campo input{
            width: 100%;
            padding: 10px;
            border: 2px solid #777;
            border-radius: 5px;
            font-size: 15px;
        }

        .boton{
            text-align: center;
            margin-top: 20px;
        }

        .boton button{
            padding: 12px 30px;
            border: none;
            background: #2d89ef;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        .boton button:hover{
            background: #1b5fa7;
        }
    </style>
</head>

<body>

    <div class="contenedor">

        <div class="titulo">
            CONTABILIDAD
        </div>

        <div class="contenido">

            <div class="perfil">

                <div class="foto">
                    <img src="https://c.pxhere.com/photos/74/ce/india_asia_man_portrait_sudra_tourism_travel_people-1293785.jpg!d" alt="Foto cliente">
                </div>

                <div class="nombre">
                    Carlitos pro max
                </div>

            </div>

        
            <div class="datos">

                <div class="campo">
                    <label>Ventas</label>
                    <input type="text" placeholder="Ingrese las ventas">
                </div>

                <div class="campo">
                    <label>Fecha</label>
                    <input type="date">
                </div>

                <div class="campo">
                    <label>Ingresos</label>
                    <input type="text" placeholder="Ingrese los ingresos">
                </div>

                <div class="campo">
                    <label>Egresos</label>
                    <input type="text" placeholder="Ingrese los egresos">
                </div>

                <div class="campo">
                    <label>Concepto</label>
                    <input type="text" placeholder="Ingrese el concepto">
                </div>

                <div class="campo">
                    <label>Valor</label>
                    <input type="number" placeholder="Ingrese el valor">
                </div>

                <div class="boton">
                    <button>Guardar</button>
                </div>

            </div>

        </div>

    </div>

</body>
</html>
