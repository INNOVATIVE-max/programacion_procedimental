<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Módulo Pedidos - INNOVATIVE</title>

    <style>
        :root {
            --bg-fondo: #0b0f19;
            --bg-bloque: #161b26;
            --neon-azul: #00f2fe;
            --texto-blanco: #ffffff;
            --texto-gris: #94a3b8;
            --input-border: rgba(255, 255, 255, 0.1);
        }

        body{
            font-family: sans-serif;
            background-color: var(--bg-fondo);
            color: var(--texto-blanco);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            box-sizing: border-box;
        }

        .contenedor{
            width: 360px; /* Lo agrandé un pelín (de 320px a 360px) para que los select se vean premium */
            background: var(--bg-bloque);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid rgba(0, 242, 254, 0.15);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h2{
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
            color: var(--neon-azul);
            font-size: 1.8rem;
            letter-spacing: 1px;
        }

        label{
            display: block;
            margin-top: 15px;
            color: var(--texto-blanco);
            font-size: 0.9rem;
            font-weight: 600;
        }

        input, select{
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            background-color: #0b0f19;
            border: 1px solid var(--input-border);
            border-radius: 6px;
            color: var(--texto-blanco);
            font-size: 0.95rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus, select:focus{
            outline: none;
            border-color: var(--neon-azul);
            box-shadow: 0 0 8px rgba(0, 242, 254, 0.3);
        }

        button{
            margin-top: 25px;
            width: 100%;
            padding: 12px;
            background-color: var(--neon-azul);
            border: none;
            border-radius: 6px;
            color: #0b0f19;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover{
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.6);
            transform: translateY(-1px);
        }

    </style>
</head>

<body>

    <form class="contenedor" id="formulario-pedidos">

        <h2>Pedidos</h2>

        <label for="tipo_movimiento">Tipo de Movimiento</label>
        <select id="tipo_movimiento">
            <option value="Seleccione">Seleccione...</option>
            <option value="Ingreso">Ingreso (Venta)</option>
            <option value="Egreso">Egreso (Gasto)</option>
        </select>

        <label for="fecha_corte">Fecha de Corte</label>
        <input type="date" id="fecha_corte">

        <label for="categoria_contable">Categoría Contable</label>
        <select id="categoria_contable">
            <option value="Seleccione">Seleccione...</option>
            <option value="Plato Fuerte">Plato Fuerte</option>
            <option value="Bebidas">Bebidas</option>
            <option value="Postres">Postres</option>
        </select>

        <label for="metodo_pago">Método de Pago</label>
        <select id="metodo_pago">
            <option value="Seleccione">Seleccione...</option>
            <option value="Efectivo">Efectivo</option>
            <option value="Nequi">Nequi</option>
            <option value="Tarjeta">Tarjeta</option>
        </select>

        <label for="concepto">Concepto del Pedido</label>
        <input type="text" id="concepto" placeholder="Ej: Pedido 2 Pizzas Familiares">

        <label for="valor_total">Valor Total</label>
        <input type="number" id="valor_total" placeholder="Ej: 30000">

        <label for="email">Email del Cliente</label>
        <input type="text" id="email" placeholder="cliente@correo.com">

        <button type="submit">Guardar Pedido</button>

    </form>

    <script src="../js/pedidos.js"></script>
</body>
</html>
